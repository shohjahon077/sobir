<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sobir | Premium Motion Experience</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Clash+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #7000ff;
            --accent: #ff2a6d;
            --dark: #0a0a0f;
            --darker: #050508;
            --light: #f8f9ff;
            --gray: #6c757d;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 25px rgba(0, 242, 254, 0.35);
            --radius: 24px;
            --radius-lg: 32px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            background: var(--darker);
            color: var(--light);
            font-family: 'Manrope', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.1) 0%, transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.1) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(255, 42, 109, 0.08) 0%, transparent 35%);
            background-attachment: fixed;
        }

        /* --- PARTICLE BACKGROUND --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* --- CURSOR SYSTEM --- */
        .cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: transform 0.1s ease-out;
            will-change: transform;
            display: none;
        }

        .cursor-follower {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(112, 0, 255, 0.3);
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .cursor-follower.hover {
            transform: translate(-50%, -50%) scale(1.8) !important;
            background: rgba(0, 242, 254, 0.4);
            border-color: rgba(0, 242, 254, 0.5);
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed;
            inset: 0;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loader-container {
            text-align: center;
            position: relative;
            padding: 40px;
            border-radius: var(--radius-lg);
            background: rgba(20, 20, 35, 0.85);
            box-shadow: var(--shadow-glow), var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 500px;
        }

        .loader-text {
            font-family: 'Clash Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 8s ease infinite;
            margin-bottom: 20px;
            position: relative;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .loader-subtext {
            font-family: 'Manrope', sans-serif;
            color: var(--gray);
            font-size: 1.1rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, 20px) scale(1.1); }
            50% { transform: translate(15px, 35px) scale(0.95); }
            75% { transform: translate(-20px, 15px) scale(1.05); }
        }

        /* --- MAIN CONTENT --- */
        .wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
        }

        .wrapper.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- PROFILE SECTION --- */
        .profile-container {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
            z-index: 10;
            max-width: 90%;
        }

        .profile-frame {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: var(--radius-full);
            overflow: hidden;
            box-shadow: var(--shadow-glow), 0 0 40px rgba(112, 0, 255, 0.4);
            border: 3px solid transparent;
            background: linear-gradient(var(--darker), var(--darker)) padding-box,
                        linear-gradient(45deg, var(--primary), var(--secondary), var(--accent)) border-box;
            animation: pulse 8s ease-in-out infinite;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-full);
            border: 3px solid var(--darker);
            transition: var(--transition);
            position: relative;
            z-index: 2;
            display: block;
        }

        .profile-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 5rem;
            font-weight: bold;
            border-radius: var(--radius-full);
            border: 3px solid var(--darker);
        }

        .profile-frame::before {
            content: '';
            position: absolute;
            inset: -5px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            border-radius: var(--radius-full);
            z-index: -1;
            animation: rotateGradient 12s linear infinite;
            opacity: 0.6;
            filter: blur(15px);
        }

        @keyframes rotateGradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .profile-name {
            font-family: 'Clash Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            margin: 10px 0 5px;
            background: linear-gradient(90deg, var(--light), var(--primary), var(--secondary));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 10s ease infinite;
            letter-spacing: -0.03em;
            position: relative;
            display: inline-block;
        }

        .profile-name::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            opacity: 0.7;
        }

        .profile-title {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: var(--gray);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 15px;
            font-weight: 500;
            position: relative;
            display: inline-block;
        }

        .profile-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: var(--primary);
            border-radius: 10px;
        }

        /* --- LINKS GRID --- */
        .links-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 50px;
            position: relative;
            z-index: 10;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .elite-btn {
            background: rgba(30, 30, 50, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 24px 28px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--light);
            backdrop-filter: blur(12px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
            transform: translateY(0);
            will-change: transform, box-shadow;
        }

        .elite-btn:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: var(--shadow), 0 5px 25px rgba(0, 242, 254, 0.25);
            background: rgba(40, 40, 70, 0.85);
        }

        .elite-btn:active {
            transform: translateY(0);
        }

        .elite-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.7s;
            z-index: 1;
        }

        .elite-btn:hover::before {
            left: 100%;
        }

        .elite-btn i {
            font-size: 1.8rem;
            min-width: 36px;
            margin-right: 20px;
            color: var(--primary);
            transition: var(--transition);
            position: relative;
            z-index: 2;
        }

        .elite-btn:hover i {
            transform: scale(1.2) rotate(5deg);
            color: var(--light);
            text-shadow: 0 0 15px var(--primary);
        }

        .elite-btn span {
            font-family: 'Clash Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.15rem;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 2;
            transition: var(--transition);
        }

        .elite-btn:hover span {
            letter-spacing: 1.5px;
            color: var(--primary);
        }

        .elite-btn::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: rgba(20, 20, 35, 0.92);
            border-radius: calc(var(--radius) - 2px);
            z-index: -1;
            transition: var(--transition);
        }

        .elite-btn:hover::after {
            background: rgba(25, 25, 45, 0.95);
        }

        /* Platform specific colors */
        .elite-btn.instagram:hover i { color: #e1306c; text-shadow: 0 0 15px #e1306c; }
        .elite-btn.telegram:hover i { color: #0088cc; text-shadow: 0 0 15px #0088cc; }
        .elite-btn.youtube:hover i { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        .elite-btn.tiktok:hover i { color: #69c9d0; text-shadow: 0 0 15px #69c9d0; }

        /* --- FLOATING ELEMENTS --- */
        .floating-element {
            position: absolute;
            border-radius: var(--radius-full);
            opacity: 0.15;
            z-index: -1;
            filter: blur(40px);
            animation: float 15s infinite ease-in-out;
        }

        .floating-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -100px;
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            animation-delay: 0s;
        }

        .floating-2 {
            width: 250px;
            height: 250px;
            bottom: -100px;
            right: -50px;
            background: linear-gradient(45deg, var(--accent), var(--primary));
            animation-delay: -5s;
        }

        .floating-3 {
            width: 200px;
            height: 200px;
            bottom: 20%;
            left: 10%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            animation-delay: -10s;
        }

        /* --- FOOTER --- */
        footer {
            margin-top: 20px;
            padding: 30px 0 40px;
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
        }

        .shoh-tag {
            font-family: 'Manrope', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--gray);
            text-decoration: none;
            transition: var(--transition);
            display: inline-block;
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(30, 30, 50, 0.6);
            backdrop-filter: blur(5px);
        }

        .shoh-tag:hover {
            color: var(--primary);
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateY(-2px);
            letter-spacing: 3px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .shoh-tag strong {
            color: var(--primary);
            font-weight: 600;
            transition: var(--transition);
        }

        .shoh-tag:hover strong {
            color: var(--light);
            text-shadow: 0 0 10px var(--primary);
        }

        /* --- ANIMATIONS FOR SCROLL --- */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }

        .fade-in.appear {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- MOBILE OPTIMIZATIONS --- */
        @media (max-width: 768px) {
            :root {
                --radius: 20px;
                --radius-lg: 28px;
            }
            
            .profile-frame {
                width: 180px;
                height: 180px;
            }
            
            .profile-name {
                font-size: clamp(2.2rem, 7vw, 3.5rem);
            }
            
            .links-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .elite-btn {
                padding: 20px 24px;
                border-radius: 20px;
            }
            
            .elite-btn i {
                font-size: 1.6rem;
                margin-right: 16px;
            }
            
            .elite-btn span {
                font-size: 1.1rem;
            }
            
            .floating-element {
                display: none;
            }
        }

        @media (max-width: 480px) {
            :root {
                --radius: 18px;
                --radius-lg: 24px;
            }
            
            .profile-container {
                max-width: 100%;
            }
            
            .profile-frame {
                width: 160px;
                height: 160px;
            }
            
            .profile-name {
                font-size: clamp(2rem, 8vw, 2.8rem);
            }
            
            .profile-title {
                font-size: 0.95rem;
                letter-spacing: 2px;
            }
            
            .elite-btn {
                padding: 18px 20px;
                border-radius: 18px;
            }
            
            .elite-btn i {
                font-size: 1.5rem;
                margin-right: 15px;
            }
            
            .elite-btn span {
                font-size: 1.05rem;
                letter-spacing: 0.3px;
            }
            
            .loader-text {
                font-size: clamp(2.5rem, 7vw, 4rem);
            }
            
            .loader-container {
                padding: 30px 20px;
                width: 95%;
            }
        }

        /* Show cursor only on desktop devices with mouse */
        @media (hover: hover) and (pointer: fine) {
            .cursor, .cursor-follower {
                display: block;
            }
        }
        
        /* Hide placeholder when image loads */
        .profile-img.loaded {
            display: block;
        }
        
        .profile-img:not(.loaded) + .profile-placeholder {
            display: flex;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    
    <div class="floating-element floating-1"></div>
    <div class="floating-element floating-2"></div>
    <div class="floating-element floating-3"></div>
    
    <div id="preloader">
        <div class="loader-container">
            <div class="loader-text">SOBIR</div>
            <div class="loader-subtext">Premium Digital Experience</div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <div class="wrapper" id="mainUI">
        <div class="profile-container fade-in">
            <div class="profile-frame">
                <img src="photo_2026-01-27_14-06-55.jpg" alt="Sobir" class="profile-img" id="profileImage">
                <div class="profile-placeholder">S</div>
            </div>
            <h1 class="profile-name">SOBIR</h1>
            <p class="profile-title">Premium Content Creator</p>
        </div>
        
        <div class="links-container fade-in">
            <div class="links-grid">
                <a href="https://www.instagram.com/sobirdee?igsh=Mjd5dW03dmR4ZXNx" class="elite-btn instagram" target="_blank">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram Profile</span>
                </a>
                <a href="https://t.me/sobirdee" class="elite-btn telegram" target="_blank">
                    <i class="fab fa-telegram-plane"></i>
                    <span>Telegram Channel</span>
                </a>
                <a href="https://youtube.com" class="elite-btn youtube" target="_blank">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube Creator</span>
                </a>
                <a href="https://tiktok.com" class="elite-btn tiktok" target="_blank">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok Official</span>
                </a>
            </div>
        </div>

        <footer class="fade-in">
            <a href="https://instagram.com/shohcore12" class="shoh-tag" target="_blank">
                Yaratuvchi <strong>SHOHJAHON MAHKAMOV</strong>
            </a>
        </footer>
    </div>

    <script>
        // DOM Elements
        const preloader = document.getElementById('preloader');
        const progressBar = document.getElementById('progress-bar');
        const mainUI = document.getElementById('mainUI');
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');
        const eliteButtons = document.querySelectorAll('.elite-btn');
        const fadeElements = document.querySelectorAll('.fade-in');
        const profileImage = document.getElementById('profileImage');
        const profilePlaceholder = document.querySelector('.profile-placeholder');
        
        // Handle image loading
        profileImage.onload = function() {
            this.classList.add('loaded');
            profilePlaceholder.style.display = 'none';
        };
        
        profileImage.onerror = function() {
            // If image fails to load, keep the placeholder
            this.style.display = 'none';
            profilePlaceholder.style.display = 'flex';
        };
        
        // Initialize canvas particles
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        // Initialize on load
        window.addEventListener('load', () => {
            // Set canvas size
            setCanvasSize();
            
            // Create particles array
            const particlesArray = [];
            const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
            
            // Particle class
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 3 + 1;
                    this.speedX = Math.random() * 3 - 1.5;
                    this.speedY = Math.random() * 3 - 1.5;
                    this.color = Math.random() > 0.5 ? '#00f2fe' : '#7000ff';
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                
                update(mouse) {
                    // Move particles
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    // Bounce off edges
                    if (this.x > canvas.width || this.x < 0) {
                        this.speedX = -this.speedX;
                    }
                    if (this.y > canvas.height || this.y < 0) {
                        this.speedY = -this.speedY;
                    }
                    
                    // Mouse interaction (only on desktop)
                    if (mouse && window.matchMedia('(hover: hover)').matches) {
                        const dx = mouse.x - this.x;
                        const dy = mouse.y - this.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 100) {
                            this.x -= dx * 0.05;
                            this.y -= dy * 0.05;
                        }
                    }
                }
                
                draw() {
                    ctx.fillStyle = `rgba(${parseInt(this.color.slice(1,3), 16)}, ${parseInt(this.color.slice(3,5), 16)}, ${parseInt(this.color.slice(5,7), 16)}, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.fill();
                }
            }
            
            // Create particles
            for (let i = 0; i < particleCount; i++) {
                particlesArray.push(new Particle());
            }
            
            // Animation loop
            let mouse = {
                x: undefined,
                y: undefined
            };
            
            function handleMouseMove(e) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw connections between nearby particles
                for (let i = 0; i < particlesArray.length; i++) {
                    for (let j = i; j < particlesArray.length; j++) {
                        const dx = particlesArray[i].x - particlesArray[j].x;
                        const dy = particlesArray[i].y - particlesArray[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 80) {
                            ctx.strokeStyle = `rgba(112, 0, 255, ${0.03 - distance/3000})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                            ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                            ctx.stroke();
                        }
                    }
                }
                
                // Update and draw particles
                for (const particle of particlesArray) {
                    particle.update(mouse);
                    particle.draw();
                }
                
                requestAnimationFrame(animate);
            }
            
            // Start animation
            animate();
            
            // Event listeners
            document.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('resize', () => {
                setCanvasSize();
            });
            
            // Cursor movement for desktop
            if (window.matchMedia('(hover: hover)').matches) {
                document.addEventListener('mousemove', (e) => {
                    cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                    
                    // Smooth follower movement
                    const followerX = cursorFollower.getBoundingClientRect().left + cursorFollower.offsetWidth/2;
                    const followerY = cursorFollower.getBoundingClientRect().top + cursorFollower.offsetHeight/2;
                    
                    const deltaX = e.clientX - followerX;
                    const deltaY = e.clientY - followerY;
                    
                    cursorFollower.style.transform = `translate(${e.clientX + deltaX/20}px, ${e.clientY + deltaY/20}px)`;
                });
                
                // Button interactions
                eliteButtons.forEach(button => {
                    button.addEventListener('mouseenter', () => {
                        cursorFollower.classList.add('hover');
                    });
                    
                    button.addEventListener('mouseleave', () => {
                        cursorFollower.classList.remove('hover');
                    });
                });
            }
            
            // Preloader animation (exactly 2 seconds as requested)
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 8;
                if (progress > 95) progress = 95;
                progressBar.style.width = `${progress}%`;
            }, 100);
            
            // Hide preloader after exactly 2 seconds
            setTimeout(() => {
                clearInterval(interval);
                progressBar.style.width = '100%';
                
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => {
                        preloader.style.display = 'none';
                        mainUI.classList.add('active');
                        
                        // Trigger fade-in animations
                        fadeElements.forEach((el, index) => {
                            setTimeout(() => {
                                el.classList.add('appear');
                            }, 300 + index * 150);
                        });
                    }, 800);
                }, 200);
            }, 2000);
        });
    </script>
</body>
</html>
